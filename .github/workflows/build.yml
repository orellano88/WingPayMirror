name: Android PayMirror Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del Proyecto
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Instalar Gradle 8.5 Oficial
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
        sudo unzip -d /opt/gradle gradle-8.5-bin.zip
        echo "/opt/gradle/gradle-8.5/bin" >> $GITHUB_PATH

    - name: Construir con Motor Stark 8.5
      run: |
        gradle assembleDebug --stacktrace

    - name: Entregar APK a la Tierra (JARVIS Protocol)
      uses: actions/upload-artifact@v4
      with:
        name: WingPayMirror-v20-APK
        path: app/build/outputs/apk/debug/app-debug.apk
