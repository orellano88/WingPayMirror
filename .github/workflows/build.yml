name: Android PayMirror Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del Proyecto
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    - name: Dar permisos de ejecución
      run: chmod +x gradlew
      working-directory: WingPayMirror

    - name: Construir APK de PayMirror
      run: ./gradlew assembleDebug --stacktrace
      working-directory: WingPayMirror

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: WingPayMirror-Debug-APK
        path: WingPayMirror/app/build/outputs/apk/debug/app-debug.apk
