plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'com.inversioneswing.paymirror'
    compileSdk 35

    defaultConfig {
        applicationId "com.inversioneswing.paymirror"
        minSdk 26
        targetSdk 35
        versionCode 20
        versionName "2.0-STARK-MIRROR"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables {
            useSupportLibrary true
        }
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("SIGNING_STORE_FILE") ?: "../wingterm.jks")
            storePassword System.getenv("SIGNING_STORE_PASSWORD") ?: "wingterm2026"
            keyAlias System.getenv("SIGNING_KEY_ALIAS") ?: "wingterm"
            keyPassword System.getenv("SIGNING_KEY_PASSWORD") ?: "wingterm2026"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            signingConfig signingConfigs.release
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    buildFeatures {
        compose true
    }
    composeOptions {
        kotlinCompilerExtensionVersion '1.5.1'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
    implementation 'androidx.activity:activity-compose:1.8.0'
    implementation platform('androidx.compose:compose-bom:2023.08.00')
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-graphics'
    implementation 'androidx.compose.material3:material3'
    
    // Conexión Web Directa Stark
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.google.gson:gson:2.10.1'

    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
}
